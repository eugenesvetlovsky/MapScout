services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mapscout
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    platform: linux/amd64
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/mapscout
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev_secret_change_me
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  web:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
